name: Release

on:
  push:
    branches: [main]
    paths:
      - custom_components/myair3/manifest.json

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check manifest version change
        id: version
        shell: bash
        run: |
          set -euo pipefail

          new_version="$(jq -r '.version' custom_components/myair3/manifest.json)"
          before_sha="${{ github.event.before }}"

          old_version=""
          if [ -n "$before_sha" ] && [ "$before_sha" != "0000000000000000000000000000000000000000" ]; then
            old_version="$(git show "${before_sha}:custom_components/myair3/manifest.json" 2>/dev/null | jq -r '.version' 2>/dev/null || true)"
          fi

          if [ -z "$new_version" ] || [ "$new_version" = "null" ]; then
            echo "manifest version is empty; nothing to release"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$old_version" = "$new_version" ]; then
            echo "manifest version unchanged ($new_version); skipping release"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Build release notes from Conventional Commits
        if: steps.version.outputs.changed == 'true'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --tag ${{ steps.version.outputs.new_version }}
          output: RELEASE_NOTES.md
        env:
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Create or update release and tag
        if: steps.version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_version }}
          name: ${{ steps.version.outputs.new_version }}
          body_path: RELEASE_NOTES.md
          target_commitish: ${{ github.sha }}
          token: ${{ github.token }}
