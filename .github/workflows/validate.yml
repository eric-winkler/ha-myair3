name: HACS Validation

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 20 * * Fri"

jobs:
  hacs_validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: HACS Validation
        uses: hacs/action@22.5.0
        with:
          category: integration
  hassfest_validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: home-assistant/actions/hassfest@master
